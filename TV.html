<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>live.m3u / txt 分组管理器</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"Microsoft YaHei";background:#f3f4f6;color:#111827}
header{height:56px;background:#111827;color:white;padding:15px 20px;font-size:20px}
.main{display:flex;height:calc(100vh - 56px)}
.sidebar{width:220px;background:#fff;border-right:1px solid #ddd;padding:12px;overflow:auto}
.content{flex:1;padding:16px;overflow:auto}
button{border:0;background:#2563eb;color:white;padding:6px 10px;border-radius:5px;cursor:pointer}
button.gray{background:#6b7280}
button.red{background:#dc2626}
button.green{background:#16a34a}
button.orange{background:#ea580c}
input{border:1px solid #d1d5db;border-radius:5px;padding:7px;font-size:14px}
textarea{width:100%;height:220px;font-family:Consolas,monospace}
.search{width:100%;margin-bottom:10px}
.group-btn{display:block;width:100%;margin-bottom:6px;background:#e5e7eb;color:#111827;text-align:left}
.group-btn.active{background:#2563eb;color:white}
.toolbar{background:white;padding:12px;border-radius:8px;margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.card{background:white;border-radius:8px;margin-bottom:12px;padding:12px;border:1px solid #e5e7eb}
.card h3{margin:0 0 8px 0;display:flex;justify-content:space-between;align-items:center}
.meta{font-size:12px;color:#6b7280;margin-bottom:8px;word-break:break-all}
.source-row{display:grid;grid-template-columns:1fr 54px 54px 54px;gap:6px;margin-bottom:6px}
.rule-row{display:grid;grid-template-columns:1fr 54px 54px 54px;gap:6px;margin-bottom:6px;width:100%}
.rule-row span{background:#f3f4f6;padding:7px;border-radius:5px;font-family:Consolas,monospace}
.badge{font-size:12px;background:#e5e7eb;padding:2px 6px;border-radius:4px;margin-left:6px}
.stat{font-size:12px;color:#059669}
.empty{font-size:12px;color:#dc2626}
.small{font-size:12px;color:#6b7280}
.hidden{display:none}
</style>
</head>
<body>

<header>live.m3u / txt 分组管理器</header>

<div class="main">
  <div class="sidebar">
    <input id="search" class="search" placeholder="搜索节目/别名" oninput="render()">
    <button id="btnAll" class="group-btn active" onclick="setGroup('')">全部</button>
    <div id="groups"></div>
  </div>

  <div class="content">

    <div class="toolbar">
      <label>
        导入 m3u / txt
        <input type="file" accept=".m3u,.txt" onchange="loadM3U(event)">
      </label>
      <button class="green" onclick="exportM3U()">导出 live.m3u</button>
      <button class="gray" onclick="saveAll()">保存</button>
      <button class="red" onclick="clearSources()">清空所有源</button>
    </div>

    <div class="toolbar">
      <b>当前分组：</b>
      <span id="currentGroup">全部</span>
      <span class="small">支持 TXT：频道名,URL / 频道名，URL / 频道名 URL</span>
    </div>

    <div id="groupTools" class="hidden">

      <div class="toolbar">
        <button class="green" onclick="addLocalPlaceholderToGroup()">当前分组生成 http://127.0.0.1/tvg-name</button>
        <button class="orange" onclick="refreshGroupRules()">重新识别排序关键词</button>
        <button class="green" onclick="applyGroupRule()">应用关键词排序</button>
        <button class="red" onclick="clearGroupRules()">清空当前分组规则</button>
      </div>

      <div id="ruleBox" class="toolbar"></div>

      <div class="toolbar">
        <input id="oldPrefix" style="width:320px" placeholder="要替换的内容，区分大小写">
        <input id="newPrefix" style="width:320px" placeholder="替换成">
        <button onclick="replacePrefix()">区分大小写替换当前分组</button>
      </div>

      <div class="toolbar">
        <input id="removeText" style="width:320px" placeholder="删除包含该文本的源，区分大小写">
        <button class="red" onclick="removeByText()">批量删除当前分组</button>
        <button class="gray" onclick="dedupeScope()">当前分组去重</button>
      </div>

    </div>

    <div id="list"></div>

    <h3>导出预览</h3>
    <textarea id="output" readonly></textarea>

  </div>
</div>

    "match": ["30080236", "柯南剧场版"]

const SOURCE_KEY = "live_m3u_sources_v6";
const RULE_KEY = "live_m3u_group_rules_v6";

let sourcesMap = loadJSON(SOURCE_KEY, {});
let groupRules = loadJSON(RULE_KEY, {});
let activeGroup = "";

initSources();
render();

function initSources(){
  TEMPLATES.forEach(t=>{
    const title = getTitle(t.extinf);
    if(!sourcesMap[title]) sourcesMap[title] = [];
  });
}

function setGroup(group){
  activeGroup = group;

  if(activeGroup && !groupRules[activeGroup]){
    groupRules[activeGroup] = autoExtractRules(activeGroup);
    saveRules();
  }

  render();
}

function render(){
  renderGroups();

  document.getElementById("currentGroup").innerText = activeGroup || "全部";
  document.getElementById("groupTools").className = activeGroup ? "" : "hidden";

  if(activeGroup) renderRuleBox();

  const box = document.getElementById("list");
  const q = document.getElementById("search").value.trim().toLowerCase();

  let html = "";

  TEMPLATES.forEach((t,index)=>{
    const title = getTitle(t.extinf);
    const group = getGroup(t.extinf);
    const urls = sourcesMap[title] || [];
    const matchText = (t.match || []).join(" / ");

    if(activeGroup && group !== activeGroup) return;

    const searchText = `${title} ${group} ${matchText}`.toLowerCase();
    if(q && !searchText.includes(q)) return;

    html += `
      <div class="card">
        <h3>
          <span>${escapeHtml(title)}<span class="badge">${escapeHtml(group)}</span></span>
          <span class="${urls.length ? "stat" : "empty"}">${urls.length} 条源</span>
        </h3>

        <div class="meta">${escapeHtml(t.extinf)}</div>
        <div class="meta">匹配：${escapeHtml(matchText || "-")}</div>

        <div>
          ${urls.map((url,i)=>sourceRow(index,i,url)).join("")}
        </div>

        <button onclick="addSource(${index})">添加源</button>
        <button class="red" onclick="clearProgram(${index})">清空本节目</button>
      </div>
    `;
  });

  box.innerHTML = html || "<p>没有节目</p>";
}

function sourceRow(programIndex, sourceIndex, url){
  return `
    <div class="source-row">
      <input value="${escapeAttr(url)}" onchange="updateSource(${programIndex},${sourceIndex},this.value)">
      <button class="gray" onclick="moveSource(${programIndex},${sourceIndex},-1)">上移</button>
      <button class="gray" onclick="moveSource(${programIndex},${sourceIndex},1)">下移</button>
      <button class="red" onclick="deleteSource(${programIndex},${sourceIndex})">删除</button>
    </div>
  `;
}

function addSource(programIndex){
  const title = getTitle(TEMPLATES[programIndex].extinf);
  sourcesMap[title].push("");
  saveSources();
  render();
}

function updateSource(programIndex, sourceIndex, value){
  const title = getTitle(TEMPLATES[programIndex].extinf);
  sourcesMap[title][sourceIndex] = value.trim();
  sourcesMap[title] = sourcesMap[title].filter(Boolean);
  saveSources();
}

function deleteSource(programIndex, sourceIndex){
  const title = getTitle(TEMPLATES[programIndex].extinf);
  sourcesMap[title].splice(sourceIndex,1);
  saveSources();
  render();
}

function moveSource(programIndex, sourceIndex, dir){
  const title = getTitle(TEMPLATES[programIndex].extinf);
  const list = sourcesMap[title];
  const next = sourceIndex + dir;
  if(next < 0 || next >= list.length) return;

  [list[sourceIndex], list[next]] = [list[next], list[sourceIndex]];
  saveSources();
  render();
}

function clearProgram(programIndex){
  if(!confirm("确定清空本节目所有源？")) return;
  const title = getTitle(TEMPLATES[programIndex].extinf);
  sourcesMap[title] = [];
  saveSources();
  render();
}

/* 当前分组生成 http://127.0.0.1/tvg-name */

function addLocalPlaceholderToGroup(){
  if(!activeGroup) return alert("请先选择分组");

  let count = 0;

  getScopeTemplates().forEach(t=>{
    const title = getTitle(t.extinf);
    const tvgName = getAttr(t.extinf, "tvg-name") || title;
    const url = "http://127.0.0.1/" + encodeURIComponent(tvgName);

    if(!sourcesMap[title]) sourcesMap[title] = [];

    if(!sourcesMap[title].includes(url)){
      sourcesMap[title].push(url);
      count++;
    }
  });

  refreshGroupRules(false);
  saveSources();
  render();
  alert(`已为「${activeGroup}」生成 ${count} 条占位源`);
}

/* 自动识别排序关键词 */

function autoExtractRules(group){
  const set = new Set();

  TEMPLATES.forEach(t=>{
    if(getGroup(t.extinf) !== group) return;

    const title = getTitle(t.extinf);

    (sourcesMap[title] || []).forEach(url=>{
      const key = extractKey(url);
      if(key) set.add(key);
    });
  });

  return [...set];
}

function extractKey(url){
  try{
    const clean = url.split("|")[0].trim();
    const u = new URL(clean);
    return u.hostname;
  }catch(e){
    return "";
  }
}

function refreshGroupRules(showAlert = true){
  if(!activeGroup) return;

  groupRules[activeGroup] = autoExtractRules(activeGroup);
  saveRules();
  renderRuleBox();

  if(showAlert) alert(`已重新识别「${activeGroup}」排序关键词`);
}

function renderRuleBox(){
  const box = document.getElementById("ruleBox");
  if(!box || !activeGroup) return;

  const rules = groupRules[activeGroup] || [];

  box.innerHTML = `
    <div style="width:100%">
      <b>${escapeHtml(activeGroup)} 自动识别排序关键词</b>
      <div class="small">越靠上优先级越高。不匹配的源自动放最后。</div>
      <br>
      ${rules.map((k,i)=>`
        <div class="rule-row">
          <span>${escapeHtml(k)}</span>
          <button class="gray" onclick="moveRule(${i},-1)">上移</button>
          <button class="gray" onclick="moveRule(${i},1)">下移</button>
          <button class="red" onclick="deleteRule(${i})">删除</button>
        </div>
      `).join("") || "<p class='small'>当前分组暂无可识别关键词</p>"}
    </div>
  `;
}

function moveRule(index, dir){
  const list = groupRules[activeGroup] || [];
  const next = index + dir;
  if(next < 0 || next >= list.length) return;

  [list[index], list[next]] = [list[next], list[index]];
  saveRules();
  renderRuleBox();
}

function deleteRule(index){
  groupRules[activeGroup].splice(index,1);
  saveRules();
  renderRuleBox();
}

function clearGroupRules(){
  if(!activeGroup) return;
  if(!confirm("确定清空当前分组排序规则？")) return;

  groupRules[activeGroup] = [];
  saveRules();
  renderRuleBox();
}

function applyGroupRule(){
  if(!activeGroup) return;

  const rules = groupRules[activeGroup] || [];
  if(!rules.length) return alert("当前分组没有排序关键词");

  getScopeTemplates().forEach(t=>{
    const title = getTitle(t.extinf);

    sourcesMap[title] = (sourcesMap[title] || []).sort((a,b)=>{
      return getRuleIndex(a,rules) - getRuleIndex(b,rules);
    });
  });

  saveSources();
  render();
  alert(`已应用到「${activeGroup}」分组`);
}

function getRuleIndex(url, rules){
  const i = rules.findIndex(k=>url.includes(k));
  return i === -1 ? 9999 : i;
}

/* 当前分组批量操作 */

function getScopeTemplates(){
  return TEMPLATES.filter(t=>{
    if(!activeGroup) return false;
    return getGroup(t.extinf) === activeGroup;
  });
}

/* 区分大小写替换 */
function replacePrefix(){
  if(!activeGroup) return alert("请先选择分组");

  const oldText = document.getElementById("oldPrefix").value;
  const newText = document.getElementById("newPrefix").value;

  if(!oldText) return alert("请输入要替换的内容");

  let count = 0;

  getScopeTemplates().forEach(t=>{
    const title = getTitle(t.extinf);

    sourcesMap[title] = (sourcesMap[title] || []).map(url=>{
      if(url.includes(oldText)){
        count++;
        return url.split(oldText).join(newText);
      }
      return url;
    });
  });

  refreshGroupRules(false);
  saveSources();
  render();
  alert(`已区分大小写替换 ${count} 条`);
}

/* 删除也区分大小写 */
function removeByText(){
  if(!activeGroup) return alert("请先选择分组");

  const text = document.getElementById("removeText").value;
  if(!text) return alert("请输入删除关键词");

  let count = 0;

  getScopeTemplates().forEach(t=>{
    const title = getTitle(t.extinf);
    const before = (sourcesMap[title] || []).length;

    sourcesMap[title] = (sourcesMap[title] || []).filter(url=>!url.includes(text));
    count += before - sourcesMap[title].length;
  });

  refreshGroupRules(false);
  saveSources();
  render();
  alert(`已区分大小写删除 ${count} 条`);
}

function dedupeScope(){
  if(!activeGroup) return alert("请先选择分组");

  getScopeTemplates().forEach(t=>{
    const title = getTitle(t.extinf);
    sourcesMap[title] = [...new Set((sourcesMap[title] || []).filter(Boolean))];
  });

  saveSources();
  render();
  alert(`「${activeGroup}」已去重`);
}

function clearSources(){
  if(!confirm("确定清空所有直播源？节目模板不会删除。")) return;

  Object.keys(sourcesMap).forEach(k=>sourcesMap[k]=[]);
  groupRules = {};

  saveSources();
  saveRules();
  render();
}

/* 导入导出 */

function loadM3U(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = ev=>{
    const result = parseM3U(ev.target.result);

    dedupeAllSilent();
    rebuildAllRules();
    saveSources();
    saveRules();
    render();

    alert(`导入完成：成功 ${result.success} 条，未匹配 ${result.fail} 条`);
  };

  reader.readAsText(file,"utf-8");
}

/**
 * 同时支持：
 * 1. M3U：
 *    #EXTINF:-1 tvg-name="CCTV1" group-title="央视",CCTV1
 *    http://xxx
 *
 * 2. TXT：
 *    cctv1,http://14.153.176.157:1234/608807420
 *    cctv1，http://14.153.176.157:1234/608807420
 *    cctv1 http://14.153.176.157:1234/608807420
 */
function parseM3U(text){
  const lines = text.split(/\r?\n/).map(x=>x.trim());
  let currentTitle = "";
  let success = 0;
  let fail = 0;

  for(const line of lines){
    if(!line) continue;
    if(line.startsWith("#EXTM3U")) continue;
    if(line.startsWith("████")) continue;

    /* M3U：#EXTINF */
    if(line.startsWith("#EXTINF")){
      currentTitle = matchTemplate(line);
      if(!currentTitle) fail++;
      continue;
    }

    /* TXT：频道名,URL 或 频道名，URL */
    let txtMatch = line.match(/^(.+?)[,，]\s*((?:https?|rtmp|rtsp):\/\/.+)$/i);

    /* TXT：频道名 URL */
    if(!txtMatch){
      txtMatch = line.match(/^(.+?)\s+((?:https?|rtmp|rtsp):\/\/.+)$/i);
    }

    if(txtMatch){
      const name = txtMatch[1].trim();
      const url = txtMatch[2].trim();
      const title = matchTxtTemplate(name);

      if(title && sourcesMap[title]){
        sourcesMap[title].push(url);
        success++;
      }else{
        fail++;
      }

      continue;
    }

    /* M3U：URL */
    if(currentTitle && !line.startsWith("#")){
      if(sourcesMap[currentTitle]){
        sourcesMap[currentTitle].push(line);
        success++;
      }else{
        fail++;
      }
      continue;
    }

    if(!line.startsWith("#")) fail++;
  }

  return {success, fail};
}

function matchTemplate(extinfLine){
  const title = getTitle(extinfLine);
  const name = getAttr(extinfLine,"tvg-name");

  for(const t of TEMPLATES){
    const fixedTitle = getTitle(t.extinf);
    const tvgName = getAttr(t.extinf,"tvg-name");
    const match = t.match || [];

    if(normalizeName(fixedTitle) === normalizeName(title)) return fixedTitle;
    if(normalizeName(tvgName) === normalizeName(title)) return fixedTitle;
    if(normalizeName(fixedTitle) === normalizeName(name)) return fixedTitle;
    if(normalizeName(tvgName) === normalizeName(name)) return fixedTitle;

    for(const m of match){
      if(normalizeName(m) === normalizeName(title)) return fixedTitle;
      if(normalizeName(m) === normalizeName(name)) return fixedTitle;
    }
  }

  return "";
}

function matchTxtTemplate(name){
  const n = normalizeName(name);

  for(const t of TEMPLATES){
    const fixedTitle = getTitle(t.extinf);
    const tvgName = getAttr(t.extinf, "tvg-name");
    const match = t.match || [];

    if(normalizeName(fixedTitle) === n) return fixedTitle;
    if(normalizeName(tvgName) === n) return fixedTitle;

    for(const m of match){
      if(normalizeName(m) === n) return fixedTitle;
    }
  }

  return "";
}

function normalizeName(str){
  return String(str || "")
    .toLowerCase()
    .replace(/\s+/g,"")
    .replace(/-/g,"")
    .replace(/_/g,"")
    .replace(/高清/g,"")
    .replace(/频道/g,"")
    .replace(/综合/g,"");
}

function buildM3U(){
  let out = '#EXTM3U x-tvg-url="https://epg.zsdc.eu.org/t.xml"\n\n';
  let lastGroup = "";

  TEMPLATES.forEach(t=>{
    const title = getTitle(t.extinf);
    const group = getGroup(t.extinf);
    const urls = (sourcesMap[title] || []).filter(Boolean);

    if(!urls.length) return;

    if(group !== lastGroup){
      out += "████████████████████████████████████████████████████████████████\n\n";
      lastGroup = group;
    }

    out += t.extinf + "\n";
    urls.forEach(url=>out += url.trim() + "\n");
    out += "\n";
  });

  return out.trim() + "\n";
}

function exportM3U(){
  const text = buildM3U();
  document.getElementById("output").value = text;
  download("live.m3u", text);
}

function download(filename, text){
  const blob = new Blob([text],{type:"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}

/* 分组 */

function renderGroups(){
  const box = document.getElementById("groups");
  const groups = [...new Set(TEMPLATES.map(t=>getGroup(t.extinf)))];

  document.getElementById("btnAll").className =
    "group-btn " + (activeGroup === "" ? "active" : "");

  box.innerHTML = groups.map(g=>`
    <button class="group-btn ${activeGroup===g?"active":""}" onclick="setGroup('${escapeJS(g)}')">
      ${escapeHtml(g)}
    </button>
  `).join("");
}

/* 存储 */

function saveSources(){
  localStorage.setItem(SOURCE_KEY, JSON.stringify(sourcesMap));
}

function saveRules(){
  localStorage.setItem(RULE_KEY, JSON.stringify(groupRules));
}

function saveAll(){
  saveSources();
  saveRules();
  alert("已保存");
}

function loadJSON(key, def){
  try{
    return JSON.parse(localStorage.getItem(key)) || def;
  }catch(e){
    return def;
  }
}

function dedupeAllSilent(){
  Object.keys(sourcesMap).forEach(title=>{
    sourcesMap[title] = [...new Set((sourcesMap[title] || []).filter(Boolean))];
  });
}

function rebuildAllRules(){
  const groups = [...new Set(TEMPLATES.map(t=>getGroup(t.extinf)))];

  groups.forEach(g=>{
    groupRules[g] = autoExtractRules(g);
  });
}

/* 工具 */

function getTitle(extinf){
  const i = extinf.lastIndexOf(",");
  return i >= 0 ? extinf.slice(i+1).trim() : "";
}

function getGroup(extinf){
  return getAttr(extinf,"group-title") || "未分组";
}

function getAttr(str,key){
  const reg = new RegExp(key + '="([^"]*)"', "i");
  const m = str.match(reg);
  return m ? m[1] : "";
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function escapeAttr(str){
  return escapeHtml(str).replaceAll('"',"&quot;");
}

function escapeJS(str){
  return String(str)
    .replaceAll("\\","\\\\")
    .replaceAll("'","\\'");
}
